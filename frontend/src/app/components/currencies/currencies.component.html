<h1>Kursy walut</h1>

    <section>
    <button type="button" (click)="onClickFetchFromNBP()" [disabled]="loading">Pobierz z NBP</button>
    <button type="button" (click)="onClickLoadCurrencies()" [disabled]="loading">Wszystkie waluty</button>
</section>

<section style="margin-top: 16px;">
    <label for="date-input">Szukaj po dacie:</label>
    <input id="date-input" #dateInput [(ngModel)]="date" placeholder="YYYY-MM-DD" [disabled]="loading" />
    <button type="button" (click)="loadByDate(dateInput.value)" [disabled]="loading">Szukaj</button>
</section>
<section *ngIf="loading" style="margin-top: 12px;">Ładowanie danych...</section>

<hr />

<section>
    <div>
        <button type="button" [class.active]="filterType === 'year'" (click)="setFilter('year')">Rok</button>
        <button type="button" [class.active]="filterType === 'quarter'" (click)="setFilter('quarter')">Kwartał</button>
        <button type="button" [class.active]="filterType === 'month'" (click)="setFilter('month')">Miesiąc</button>
        <button type="button" [class.active]="filterType === 'day'" (click)="setFilter('day')">Dzień</button>
        <button type="button" (click)="resetFilter()">Pokaż wszystkie</button>
    </div>

    <div style="margin-top: 12px;" *ngIf="filterType === 'year'">
        <label>Wybierz rok:</label>
        <select [(ngModel)]="selectedYear" (change)="applyFilter()">
            <option value="">Wszystkie lata</option>
            <option *ngFor="let year of years" [value]="year">{{ year }}</option>
        </select>
    </div>

    <div style="margin-top: 12px;" *ngIf="filterType === 'quarter'">
        <label>Wybierz kwartał:</label>
        <select [(ngModel)]="selectedQuarter" (change)="applyFilter()">
            <option value="">Wszystkie kwartały</option>
            <option *ngFor="let quarter of quarters" [value]="quarter">{{ quarter }}</option>
        </select>
    </div>

    <div style="margin-top: 12px;" *ngIf="filterType === 'month'">
        <label>Wybierz miesiąc:</label>
        <select [(ngModel)]="selectedMonth" (change)="applyFilter()">
            <option value="">Wszystkie miesiące</option>
            <option *ngFor="let month of months" [value]="month.value">{{ month.label }}</option>
        </select>
    </div>

    <div style="margin-top: 12px;" *ngIf="filterType === 'day'">
        <label>Wybierz dzień:</label>
        <select [(ngModel)]="selectedDay" (change)="applyFilter()">
            <option value="">Wszystkie dni</option>
            <option *ngFor="let d of days; let i = index" [value]="d">{{ i + 1 }}</option>
        </select>
    </div>
</section>

<section *ngIf="error" style="color: red; margin-top: 12px;">{{ error }}</section>

<hr />

<table>
    <thead>
        <tr>
            <th>Kod</th>
            <th>Kurs</th>
            <th>Data</th>
        </tr>
    </thead>
    <tbody>
        <tr *ngFor="let c of filteredCurrencies">
            <td>{{ c.code }}</td>
            <td>{{ c.rate }}</td>
            <td>{{ c.date }}</td>
        </tr>
    </tbody>
</table>

<section *ngIf="!filteredCurrencies.length && !loading" style="margin-top: 12px;">
    Brak kursów do wyświetlenia.
</section>
